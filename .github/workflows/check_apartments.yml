name: Novus Westshore B1 Availability Check

on:
  schedule:
    # Runs every day at 8:00 AM Eastern (12:00 UTC)
    - cron: "0 12 * * *"
  workflow_dispatch: # allows manual trigger from GitHub UI

permissions:
  contents: write   # needed to commit known_units.json back to repo

jobs:
  check-availability:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run availability check
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          NOTIFY_EMAIL:   ${{ secrets.NOTIFY_EMAIL }}
        run: python check_apartments.py

      - name: Save updated known_units.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add known_units.json
          git diff --cached --quiet || git commit -m "chore: update known units [skip ci]"
          git push
